<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Generator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c3483">
  <style>
    :root {
      --purple: #6c3483;
      --purple-light: #9b59b6;
      --purple-dark: #4a235a;
      --gold: #f1c40f;
      --white: #ffffff;
      --light-bg: #f5eef8;
      --border: #e8daef;
      --gray: #666666;
      --dark: #1a1a1a;
    }

    .dark-mode {
      --white: #1a0a2e;
      --light-bg: #0d0618;
      --border: #4a235a;
      --gray: #aaaaaa;
      --dark: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.3s, color 0.3s;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--light-bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--purple);
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(108,52,131,0.4);
      animation: bounce 1.5s infinite;
      white-space: nowrap;
      border: none;
    }

    .ios-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--white);
      color: var(--dark);
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      text-align: center;
      width: 90%;
      max-width: 340px;
      border: 1px solid var(--border);
    }

    .ios-banner strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      color: var(--purple);
    }

    .ios-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: transparent;
      border: none;
      color: var(--gray);
      font-size: 16px;
      cursor: pointer;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-6px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .header-left h1 {
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    .header-left h1 span { color: var(--gold); }
    .header-left p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .theme-toggle {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50px;
      padding: 8px 14px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding-bottom: 100px;
    }

    .quote-card {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      width: 100%;
      box-shadow: 0 8px 32px rgba(108,52,131,0.3);
      animation: fadeIn 0.5s ease;
    }

    .quote-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .quote-text {
      font-size: 18px;
      color: white;
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 20px;
      min-height: 80px;
    }

    .quote-author {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }

    .quote-category {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 50px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .btn {
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: white;
      box-shadow: 0 4px 16px rgba(108,52,131,0.3);
    }

    .btn-whatsapp {
      background: #25d366;
      color: white;
      box-shadow: 0 4px 16px rgba(37,211,102,0.3);
    }

    .btn-facebook {
      background: #1877f2;
      color: white;
      box-shadow: 0 4px 16px rgba(24,119,242,0.3);
    }

    .btn-twitter {
      background: #000000;
      color: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .btn-copy {
      background: var(--white);
      color: var(--purple);
      border: 1px solid var(--border);
      grid-column: span 2;
    }

    .category-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .cat-btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: var(--white);
      color: var(--gray);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn.active {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    .counter {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }

    .copyright {
      text-align: center;
      color: var(--gray);
      font-size: 12px;
      padding: 20px 0;
    }

    .copied-toast {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--purple);
      color: white;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: fadeIn 0.3s ease;
    }

    .share-label {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
      width: 100%;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <button class="install-banner" id="installBtn" onclick="installApp()">
    📲 Install Quote Generator
  </button>

  <div class="ios-banner" id="iosBanner">
    <button class="ios-close" onclick="closeIosBanner()">✕</button>
    <strong>📲 Install on iPhone/iPad</strong>
    Tap the Share button (⬆️) in Safari then tap "Add to Home Screen" to install this app
  </div>

  <div class="copied-toast" id="copiedToast">✅ Quote copied!</div>

  <header>
    <div class="header-left">
      <h1>Daily <span>Quotes</span></h1>
      <p>TeaJay Konsult Ltd.</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </header>

  <div class="container">

    <div class="category-row">
      <button class="cat-btn active" onclick="setCategory('all', this)">All</button>
      <button class="cat-btn" onclick="setCategory('motivation', this)">💪 Motivation</button>
      <button class="cat-btn" onclick="setCategory('success', this)">🏆 Success</button>
      <button class="cat-btn" onclick="setCategory('life', this)">🌱 Life</button>
      <button class="cat-btn" onclick="setCategory('wisdom', this)">🧠 Wisdom</button>
    </div>

    <div class="quote-card" id="quoteCard">
      <div class="quote-icon">💬</div>
      <div class="quote-text" id="quoteText">Tap the button below to get your first quote!</div>
      <div class="quote-author" id="quoteAuthor"></div>
      <div class="quote-category" id="quoteCategory"></div>
    </div>

    <div class="counter" id="quoteCounter"></div>

    <button class="btn btn-primary" style="width:100%" onclick="newQuote()">✨ New Quote</button>

    <div class="share-label">Share this quote</div>

    <div class="btn-row">
      <button class="btn btn-whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
      <button class="btn btn-facebook" onclick="shareFacebook()">📘 Facebook</button>
      <button class="btn btn-twitter" onclick="shareTwitter()">🐦 X (Twitter)</button>
      <button class="btn btn-copy" onclick="copyQuote()">📋 Copy Quote</button>
    </div>

    <div class="copyright">© 2026 TeaJay Konsult Ltd. All rights reserved.</div>
  </div>

<script>
  const APP_LINK = 'https://teajaykonsult-daily-quotes.vercel.app';

  const quotes = [
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain", category: "motivation" },
    { text: "It always seems impossible until it's done.", author: "Nelson Mandela", category: "motivation" },
    { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson", category: "motivation" },
    { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", category: "motivation" },
    { text: "Act as if what you do makes a difference. It does.", author: "William James", category: "motivation" },
    { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", category: "success" },
    { text: "The road to success and the road to failure are almost exactly the same.", author: "Colin R. Davis", category: "success" },
    { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau", category: "success" },
    { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller", category: "success" },
    { text: "I find that the harder I work, the more luck I seem to have.", author: "Thomas Jefferson", category: "success" },
    { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", category: "life" },
    { text: "Life is what happens when you're busy making other plans.", author: "John Lennon", category: "life" },
    { text: "The purpose of our lives is to be happy.", author: "Dalai Lama", category: "life" },
    { text: "You only live once, but if you do it right, once is enough.", author: "Mae West", category: "life" },
    { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller", category: "life" },
    { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates", category: "wisdom" },
    { text: "The journey of a thousand miles begins with one step.", author: "Lao Tzu", category: "wisdom" },
    { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi", category: "wisdom" },
    { text: "He who knows others is wise; he who knows himself is enlightened.", author: "Lao Tzu", category: "wisdom" },
    { text: "Knowledge speaks, but wisdom listens.", author: "Jimi Hendrix", category: "wisdom" },
    { text: "Every step forward, no matter how small, is progress worth celebrating.", author: "Pamilerin Adetunji Ajala", category: "motivation" },
    { text: "Your dreams are valid, your efforts are enough, keep pushing.", author: "Pamilerin Adetunji Ajala", category: "motivation" },
    { text: "Build something today that your future self will be grateful for.", author: "Pamilerin Adetunji Ajala", category: "success" },
    { text: "The man who works with purpose will never run out of reasons to wake up.", author: "Pamilerin Adetunji Ajala", category: "success" },
    { text: "Life rewards consistency more than it rewards talent.", author: "Pamilerin Adetunji Ajala", category: "life" },
    { text: "Do not rush the process, greatness takes time to blossom.", author: "Pamilerin Adetunji Ajala", category: "wisdom" },
    { text: "A gentle heart carries the strength of a thousand warriors.", author: "Foluke Grace Ajala", category: "life" },
    { text: "Love is not just a feeling, it is a daily decision to show up.", author: "Foluke Grace Ajala", category: "life" },
    { text: "A man of character plants trees under whose shade he will never sit.", author: "Oluranti Ajala", category: "wisdom" },
    { text: "Teach your children the value of hard work and integrity, it is the greatest inheritance.", author: "Oluranti Ajala", category: "wisdom" }
  ];

  let currentCategory = 'all';
  let currentQuote = null;
  let isDark = false;
  let deferredPrompt = null;
  let shownQuotes = [];

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches;

  if (isIOS && !isInStandaloneMode) {
    document.getElementById('iosBanner').style.display = 'block';
  }

  function closeIosBanner() {
    document.getElementById('iosBanner').style.display = 'none';
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'block';
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBtn').style.display = 'none';
    deferredPrompt = null;
  });

  async function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
    deferredPrompt = null;
  }

  function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('dark-mode', isDark);
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  }

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    shownQuotes = [];
    newQuote();
  }

  function newQuote() {
    let pool = currentCategory === 'all' ? quotes : quotes.filter(q => q.category === currentCategory);
    if (shownQuotes.length >= pool.length) shownQuotes = [];
    let available = pool.filter(q => !shownQuotes.includes(q));
    const quote = available[Math.floor(Math.random() * available.length)];
    shownQuotes.push(quote);
    currentQuote = quote;

    const card = document.getElementById('quoteCard');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeIn 0.5s ease';

    document.getElementById('quoteText').textContent = `"${quote.text}"`;
    document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
    document.getElementById('quoteCategory').textContent = quote.category;
    document.getElementById('quoteCounter').textContent = `${shownQuotes.length} of ${pool.length} quotes`;
  }

  function getShareText() {
    return `💬 *"${currentQuote.text}"*\n\n— ${currentQuote.author}\n\n_Shared via Daily Quotes by TeaJay Konsult Ltd._\n🌐 Get the app: ${APP_LINK}`;
  }

  function copyQuote() {
    if (!currentQuote) return;
    const text = `"${currentQuote.text}" — ${currentQuote.author}\n\nShared via Daily Quotes by TeaJay Konsult Ltd.\n🌐 Get the app: ${APP_LINK}`;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('copiedToast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2000);
    });
  }

  function shareWhatsApp() {
    if (!currentQuote) return;
    window.open(`https://wa.me/?text=${encodeURIComponent(getShareText())}`, '_blank');
  }

  function shareFacebook() {
    if (!currentQuote) return;
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(APP_LINK)}&quote=${encodeURIComponent(`"${currentQuote.text}" — ${currentQuote.author}`)}`, '_blank');
  }

  function shareTwitter() {
    if (!currentQuote) return;
    const text = `💬 "${currentQuote.text}" — ${currentQuote.author}\n\nGet the app: ${APP_LINK}`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
  }

  newQuote();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
